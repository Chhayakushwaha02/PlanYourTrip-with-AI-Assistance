{% extends "base.html" %}

{% block content %}

<style>

.form-container{
width:450px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.form-container h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
display:flex;
flex-direction:column;
}

.form-group label{
font-weight:bold;
margin-bottom:5px;
}

.form-group input,select{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#388E3C;
}

</style>

<div class="form-container">

<h2>Edit Profile</h2>

<form method="POST">

<div class="form-group">
<label>Name</label>
<input type="text" name="username" value="{{user.username}}" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" value="{{user.email}}" required>
</div>

<div class="form-group">
<label>Mobile</label>
<input type="text" name="mobile" value="{{user.mobile}}">
</div>

<div class="form-group">
<label>Gender</label>
<input type="text" name="gender" value="{{user.gender}}">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="age" value="{{user.age}}">
</div>

<button type="submit">Update Profile</button>

</form>

</div>

{% endblock %}
