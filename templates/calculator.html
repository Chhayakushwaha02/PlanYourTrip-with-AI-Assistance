{% extends "base.html" %}

{% block content %}

<style>

/* BACKGROUND */
body{
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
    background-size: cover;
    overflow: hidden; /* Prevent scrolling/movable screen */
}

/* CONTAINER FIX */
.container{
    padding:30px 60px !important;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr; /* Equal width for both boxes */
    gap:25px;
    align-items:start;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.95);
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    height:450px; /* Fixed height */
    overflow-y:auto; /* Scroll inside if content exceeds */
}

/* TITLE */
h1{
    margin-top:0;
}

/* INPUT */
.input-group{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    width:100%;
}

button{
    padding:10px 15px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056cc;
    transform:scale(1.05);
}

/* LIST */
.expense{
    display:flex;
    justify-content:space-between;
    background:#f1f3f6;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

/* TOTAL */
.total{
    background:#d6ecff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

/* CALCULATOR */
.display{
    background:#ecf0f1; /* Light background */
    color:black; /* Numbers in black */
    padding:20px;
    border-radius:10px;
    text-align:right;
    font-size:28px;
    margin-bottom:15px;
}

/* CALCULATOR GRID */
.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

/* BUTTON STYLE */
.calc-btn{
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ecf0f1;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:black; /* Button text in black */
}

/* HOVER EFFECT */
.calc-btn:hover{
    background:#d0d7de;
    transform:scale(1.08);
}

/* OPERATORS */
.operator{
    background:#b2dfdb;
    font-weight:bold;
}

/* EQUAL */
.equal{
    grid-column:span 2;
    background:#0077ff;
    color:white;
    font-weight:bold;
}

.equal:hover{
    background:#0056cc;
}

/* CLEAR */
.clear{
    background:#ff6b6b;
    color:white;
    font-weight:bold;
}

.clear:hover{
    background:#e84141;
}

</style>

<h1>Trip Budget Calculator</h1>
<p>Track and manage all your travel expenses in one place.</p>

<div class="grid">

    <!-- LEFT -->
    <div class="card">

        <h3>Expense Tracker</h3>

        <div class="input-group">
            <input type="text" id="name" placeholder="Expense Name">
            <input type="number" id="amount" placeholder="Amount">
            <button onclick="addExpense()">Add</button>
        </div>

        <div id="expenseList"></div>

        <div class="total">
            Total: ₹<span id="total">0</span>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="card">

        <h3>Calculator</h3>

        <div class="display" id="display">0</div>

        <div class="calc-grid">
            <button class="calc-btn clear" onclick="clearDisplay()">C</button>
            <button class="calc-btn operator" onclick="append('/')">/</button>
            <button class="calc-btn operator" onclick="append('*')">*</button>
            <button class="calc-btn operator" onclick="deleteLast()">DEL</button>

            <button class="calc-btn" onclick="append('7')">7</button>
            <button class="calc-btn" onclick="append('8')">8</button>
            <button class="calc-btn" onclick="append('9')">9</button>
            <button class="calc-btn operator" onclick="append('-')">-</button>

            <button class="calc-btn" onclick="append('4')">4</button>
            <button class="calc-btn" onclick="append('5')">5</button>
            <button class="calc-btn" onclick="append('6')">6</button>
            <button class="calc-btn operator" onclick="append('+')">+</button>

            <button class="calc-btn" onclick="append('1')">1</button>
            <button class="calc-btn" onclick="append('2')">2</button>
            <button class="calc-btn" onclick="append('3')">3</button>
            <button class="calc-btn" onclick="append('0')">0</button>

            <button class="calc-btn" onclick="append('.')">.</button>
            <button class="calc-btn equal" onclick="calculate()">=</button>
        </div>

    </div>

</div>

<script>
let total = 0;

function addExpense(){
    let name=document.getElementById("name").value;
    let amount=parseFloat(document.getElementById("amount").value);

    if(!name || isNaN(amount)) return;

    total+=amount;
    document.getElementById("total").innerText=total;

    let div=document.createElement("div");
    div.className="expense";
    div.innerHTML=`${name} - ₹${amount} <span onclick="removeExpense(this,${amount})" style="color:red;cursor:pointer;">🗑</span>`;

    document.getElementById("expenseList").appendChild(div);

    document.getElementById("name").value="";
    document.getElementById("amount").value="";
}

function removeExpense(el,amount){
    total-=amount;
    document.getElementById("total").innerText=total;
    el.parentElement.remove();
}

let display=document.getElementById("display");

function append(val){
    if(display.innerText==="0") display.innerText=val;
    else display.innerText+=val;
}

function clearDisplay(){
    display.innerText="0";
}

function deleteLast(){
    display.innerText=display.innerText.slice(0,-1)||"0";
}

function calculate(){
    try{
        display.innerText=eval(display.innerText);
    }catch{
        display.innerText="Error";
    }
}
</script>

{% endblock %}
