<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome - Smart Trip Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* Background */
body{
    height:100vh;
    background: linear-gradient(135deg,#d6b3ff,#b3d9ff);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-15px);}
    100% { transform: translateY(0px);}
}

/* Splash Card */
.splash-container{
    text-align:center;
    animation: fadeIn 1.5s ease-in-out;
}

/* Image */
.splash-container img{
    width:220px;
    animation: float 3s ease-in-out infinite;
}

/* Title */
.title{
    font-size:28px;
    font-weight:600;
    color:#333;
    margin-top:15px;
}

/* Subtitle */
.subtitle{
    font-size:16px;
    color:#555;
    margin-top:8px;
}

/* Popup */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition:0.4s;
}

.popup.active{
    transform:translate(-50%,-50%) scale(1);
}

/* Popup Title */
.popup h2{
    color:#6a5acd;
    margin-bottom:10px;
}

/* Popup Text */
.popup p{
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

/* Button */
.btn{
    padding:10px 20px;
    border:none;
    background:linear-gradient(135deg,#a18cd1,#6dd5ed);
    color:white;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* Fade animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="splash-container">
    <img src="https://cdn-icons-png.flaticon.com/512/201/201623.png" alt="Travel Image">

    <div class="title">PlanYourTrip with AI Assistance🤖✨</div>
    <div class="subtitle">Where smart planning meets unforgettable travel💜</div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>Plan Your Trip with AI Assistance🤖❤️</h2>
    <p>
        Discover destinations, create smart itineraries, and travel stress-free with AI-powered planning. 
        Because every great journey deserves a smart beginning. 💫
    </p>
    <button class="btn" onclick="goNext()">Get Started 🚀</button>
</div>

<script>
setTimeout(()=>{
    document.getElementById("popup").classList.add("active");
},1500);

function goNext(){
    window.location.href="/auth";  // redirect to your auth page
}
</script>

</body>
</html>
