{% extends "base.html" %}

{% block content %}

<style>

/* ===========================
   FULL PAGE BACKGROUND FIXED
=========================== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* FIXED background */
    overflow: hidden; /* remove scrollbars */
}

/* DARK OVERLAY */
body::after{
    content:"";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.45); /* dark overlay */
    z-index:-1;
}

/* MAIN CONTAINER */
.dashboard-container{
    min-height: 80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding: 40px 20px;
    box-sizing: border-box;
}

/* TITLE */
.dashboard-container h1{
    font-size: 36px;
    margin-bottom: 10px;
}

/* SUBTEXT */
.dashboard-container p{
    font-size: 16px;
    max-width: 600px;
    margin-bottom: 10px;
    opacity: 0.9;
}

/* BUTTON CONTAINER */
.main-buttons{
    margin-top: 25px;
    display:flex;
    gap:20px;
    flex-wrap: wrap;
    justify-content:center;
}

/* BUTTON STYLE */
.btn{
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* NICE CUTE BUTTON COLORS */
.btn:nth-child(1){ background: #FF6B81; }   /* bright pink */
.btn:nth-child(2){ background: #6EC1E4; }   /* soft blue */
.btn:nth-child(3){ background: #7BED9F; }   /* soft green */

/* HOVER EFFECT */
.btn:hover{
    transform: translateY(-3px) scale(1.05);
    opacity: 0.9;
}

</style>

<div class="dashboard-container">

    <h1>Welcome, {{username}} 👋</h1>

    <p><b>Where smart planning meets unforgettable travel.</b></p>

    <p>
        Unlock AI-driven itineraries designed around your preferences, budget, and goals.
    </p>

    <p>
        Because every great journey deserves a smart beginning.
    </p>

    <div class="main-buttons">

        <a href="/plantrip">
            <button class="btn">✈️ Plan Trip</button>
        </a>

        <a href="/mytrips">
            <button class="btn">💖 My Trips</button>
        </a>

        <a href="/explore">
            <button class="btn">🌍 Explore</button>
        </a>

        <a href="/calculator">
            <button class="btn">🔢 Budget Calculator</button>
        </a>

    </div>

</div>

{% endblock %}
